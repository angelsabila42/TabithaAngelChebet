<div class="modal-overlay" id="deleteModal-{{ student.id }}">
    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="deleteModalTitle-{{ student.id }}">
        <h3 id="deleteModalTitle-{{ student.id }}">Delete Student?</h3>
        <p>Are you sure you want to delete <strong>{{ student.student_name }}</strong>?</p>
        <form action="{{ url_for('delete_student', student_id=student.id) }}" method="POST">
            <button type="button" class="modal-cancel">Cancel</button>
            <button type="submit" class="modal-delete">Delete</button>
        </form>
    </div>
</div>
