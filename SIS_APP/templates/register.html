{% extends "base.html" %}

{% block title %}Register - Student Information System{% endblock %}

{% block content %}
    <section class="register-page">
        {% if form_data %}
        <h2>Update Form</h2>
        {% else %}
        <h2>Student Registration Form</h2>
        {% endif %}
        <div class="form-container">
            <form method="POST" action="{{ form_action if form_action else url_for('register') }}" class="registration-form">
                <div class="form-group">
                    <label for="student_name">Student Name *</label>
                    <input type="text" id="student_name" name="student_name" value="{{ form_data.student_name if form_data else ""}}"
                           placeholder="Enter your full name" required>
                </div>

                <div class="form-group">
                    <label for="registration_number">Registration Number *</label>
                    <input type="text" id="registration_number" name="registration_number"  value="{{ form_data.registration_number if form_data else ""}}"
                           placeholder="e.g., STU123456" required>
                </div>

                <div class="form-group">
                    <label for="email">Email Address *</label>
                    <input type="email" id="email" name="email" value="{{ form_data.email if form_data else ""}}"
                           placeholder="you@mak.ac.ug" required>
                </div>

                <div class="form-group">
                    <label for="programme">Programme of Study *</label>
                    <select id="programme" name="programme" required>
                        <option value="">Select your programme</option>
                        <option value="Software Engineering" {% if form_data and form_data.programme == 'Software Engineering' %}selected{% endif %}>Software Engineering</option>
                        <option value="Computer Science" {% if form_data and form_data.programme == 'Computer Science' %}selected{% endif %}>Computer Science</option>
                        <option value="Information Technology" {% if form_data and form_data.programme == 'Information Technology' %}selected{% endif %}>Information Technology</option>
                        <option value="Data Science" {% if form_data and form_data.programme == 'Data Science' %}selected{% endif %}>Data Science</option>
                        <option value="Library and Information Systems" {% if form_data and form_data.programme == 'Library and Information Systems' %}selected{% endif %}>Library and Information Systems</option>
                        <option value="Robotics Engineering" {% if form_data and form_data.programme == 'Robotics Engineering' %}selected{% endif %}>Robotics Engineering</option>
                    </select>
                </div>

                <div class="form-group">
                    {% if form_data %}
                    <button type="submit" class="btn btn-primary">Update Student</button>
                    {% else %}
                    <button type="submit" class="btn btn-primary">Register Student</button>
                    {% endif %}
                    <button type="reset" class="btn btn-secondary">Clear Form</button>
                </div>
            </form>
        </div>
    </section>
{% endblock %}
